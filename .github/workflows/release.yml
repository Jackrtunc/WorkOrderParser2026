name: Build Installers

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Build fat jar
        run: mvn package

      # Linux - produces .deb
      - name: Run jpackage (Linux)
        if: runner.os == 'Linux'
        run: |
          jpackage \
            --input target \
            --main-jar Work_Order_Parser-2.0.jar \
            --main-class com.WOP.Main \
            --name WorkOrderParser \
            --app-version 2.0 \
            --vendor "JT" \
            --type deb \
            --dest target/installer \
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens java.base/java.util=ALL-UNNAMED"

      # Windows - produces .msi
      - name: Run jpackage (Windows)
        if: runner.os == 'Windows'
        run: |
          jpackage `
            --input target `
            --main-jar Work_Order_Parser-2.0.jar `
            --main-class com.WOP.Main `
            --name WorkOrderParser `
            --app-version 2.0 `
            --vendor "JT" `
            --type msi `
            --dest target/installer `
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" `
            --java-options "--add-opens java.base/java.util=ALL-UNNAMED"

      # Mac - produces .dmg
      - name: Run jpackage (Mac)
        if: runner.os == 'macOS'
        run: |
          jpackage \
            --input target \
            --main-jar Work_Order_Parser-2.0.jar \
            --main-class com.WOP.Main \
            --name WorkOrderParser \
            --app-version 2.0 \
            --vendor "JT" \
            --type dmg \
            --dest target/installer \
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens java.base/java.util=ALL-UNNAMED"

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/installer/*